  const reports=emp.reports.map(id=>byId[id]).filter(Boolean);
  const cInfo=emp.contractor?(CONTRACTOR_INFO[emp.name]||{}):null;
  const wInfo=emp.wgu?(WGU_INFO[emp.name]||{}):null;
  const Row=({icon,label,val})=>(<div style={{display:"flex",gap:10,marginBottom:13}}><span style={{fontSize:15,flexShrink:0}}>{icon}</span><div style={{minWidth:0}}><div style={{fontSize:9.5,color:BRAND.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div><div style={{fontSize:12,color:BRAND.navy,marginTop:1,wordBreak:"break-word"}}>{val}</div></div></div>);
  return(<div style={{position:"fixed",right:0,top:0,bottom:0,width:296,background:BRAND.white,boxShadow:"-4px 0 28px rgba(0,40,85,0.14)",zIndex:200,display:"flex",flexDirection:"column",animation:"panelIn 0.18s ease"}}>
    <style>{`@keyframes panelIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}`}</style>
    <div style={{background:color,padding:"22px 18px 18px",color:BRAND.white,flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><Avatar emp={emp} size={48}/><button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,color:BRAND.white,cursor:"pointer",padding:"4px 10px",fontSize:14,fontWeight:700}}>✕</button></div>
      <h2 style={{margin:"12px 0 4px",fontSize:17,fontWeight:800,lineHeight:1.2}}>{emp.group?emp.name:emp.tbh?"Open Role":emp.name}</h2>
      <p style={{margin:0,opacity:0.85,fontSize:12,lineHeight:1.4}}>{emp.title}</p>
      <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
        {emp.wgu&&<span style={{fontSize:10,fontWeight:700,background:"rgba(255,255,255,0.25)",borderRadius:5,padding:"2px 8px"}}>WGU Extended Team</span>}
        {emp.contractor&&<span style={{fontSize:10,fontWeight:700,background:"rgba(255,255,255,0.25)",borderRadius:5,padding:"2px 8px"}}>Contractor</span>}
        {emp.group&&<span style={{fontSize:10,fontWeight:700,background:"rgba(255,255,255,0.25)",borderRadius:5,padding:"2px 8px"}}>Group · {emp.reports.length} members</span>}
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:18}}>
      {!emp.group&&!emp.contractor&&!emp.wgu&&[["🏢","Department",emp.dept],["📍","Location",emp.loc],emp.tz?["🕒","Timezone",emp.tz]:null,manager?["👤","Reports to",manager.name]:null].filter(Boolean).map(([i,l,v])=><Row key={l} icon={i} label={l} val={v}/>)}
      {emp.wgu&&[wInfo.email?["✉️","Email",wInfo.email]:null,wInfo.role?["🎯","Role at Craft",wInfo.role]:null,emp.loc?["📍","Location",emp.loc]:null,emp.tz?["🕒","Timezone",emp.tz]:null].filter(Boolean).map(([i,l,v])=><Row key={l} icon={i} label={l} val={v}/>)}
      {emp.contractor&&[cInfo.howToContact?["📬","How to Contact",cInfo.howToContact]:null,cInfo.email&&!cInfo.howToContact?.toLowerCase().includes("project lead")?["✉️","Email",cInfo.email]:null,cInfo.projects?["📋","Project(s)",cInfo.projects]:null,cInfo.expertise?["🎯","Expertise",cInfo.expertise]:null,cInfo.projectLead?["👤","Project Lead",cInfo.projectLead]:null,cInfo.endDate?["📅","Contract End",cInfo.endDate]:null,emp.loc?["📍","Location",emp.loc]:null].filter(Boolean).map(([i,l,v])=><Row key={l} icon={i} label={l} val={v}/>)}
      {reports.length>0&&<div style={{marginTop:emp.group?0:18}}><h4 style={{margin:"0 0 10px",fontSize:11,color:BRAND.textMuted,textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:700}}>{emp.group?"Members":"Direct Reports"} ({reports.length})</h4>{reports.map(r=>(<div key={r.id} onClick={()=>onSelect(r)} style={{display:"flex",gap:9,alignItems:"center",padding:"7px 10px",borderRadius:8,cursor:"pointer",border:`1px solid ${BRAND.gray}`,marginBottom:5,transition:"background 0.12s"}} onMouseEnter={e=>e.currentTarget.style.background=BRAND.canvas} onMouseLeave={e=>e.currentTarget.style.background=BRAND.white}><Avatar emp={r} size={28}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,color:r.tbh?BRAND.textMuted:BRAND.navy,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:5}}>{r.tbh?"Open Role":r.name}{r.contractor&&<span style={{fontSize:9,background:"#e8edf2",color:BRAND.textMuted,borderRadius:4,padding:"1px 4px",border:`1px solid ${BRAND.gray}`}}>C</span>}</div><div style={{fontSize:10.5,color:BRAND.textMuted}}>{r.title}</div></div><span style={{fontSize:12,color:BRAND.textMuted}}>›</span></div>))}</div>}
    </div>
  </div>);}

function App(){
  const[view,setView]=useState("tree");
  const[expanded,setExpanded]=useState(new Set());
  const[selected,setSelected]=useState(null);
  const[activeDept,setActiveDept]=useState("All");
  const[searchTerm,setSearchTerm]=useState("");
  const[zoom,setZoom]=useState(1);
  const[pan,setPan]=useState({x:0,y:0});
  const[dragging,setDragging]=useState(false);
  const dragStart=useRef(null);
  const canvasRef=useRef(null);
  const onToggle=useCallback(emp=>{setExpanded(prev=>{const n=new Set(prev);n.has(emp.id)?n.delete(emp.id):n.add(emp.id);return n;});},[]);
  const onCard=useCallback(emp=>setSelected(emp),[]);
  const onMouseDown=e=>{if(e.button!==0)return;setDragging(true);dragStart.current={x:e.clientX-pan.x,y:e.clientY-pan.y};};
  const onMouseMove=e=>{if(!dragging)return;setPan({x:e.clientX-dragStart.current.x,y:e.clientY-dragStart.current.y});};
  const onMouseUp=()=>setDragging(false);
  const onWheel=useCallback(e=>{if(e.ctrlKey||e.metaKey){e.preventDefault();setZoom(z=>Math.min(2,Math.max(0.25,z-e.deltaY*0.001)));}},[]);
  useEffect(()=>{const el=canvasRef.current;if(!el)return;el.addEventListener("wheel",onWheel,{passive:true});return()=>el.removeEventListener("wheel",onWheel);},[onWheel]);
  const s=searchTerm.trim().toLowerCase();
  const filterActive=activeDept!=="All"||s!=="";
  const matchFn=emp=>{const ms=!s||emp.name.toLowerCase().includes(s)||emp.title.toLowerCase().includes(s)||emp.dept.toLowerCase().includes(s);const md=activeDept==="All"||(activeDept==="WGU"&&emp.wgu)||(activeDept==="Contractors"&&emp.contractor)||(activeDept==="Open Roles"&&emp.tbh)||(!emp.wgu&&!emp.group&&emp.dept===activeDept);return ms&&md;};
  const showWGURow=(activeDept==="All"||activeDept==="WGU")&&s==="";
  const totalMatches=employees.filter(matchFn).length;
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",background:BRAND.canvas,overflow:"hidden"}}>
      <div style={{background:BRAND.navy,padding:"10px 20px",flexShrink:0,borderBottom:"1px solid #00396e"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}><Logo/><div><div style={{color:BRAND.white,fontWeight:800,fontSize:15,letterSpacing:"-0.02em",lineHeight:1}}>Craft</div><div style={{color:"#4a7aaa",fontSize:11,marginTop:1}}>Org Chart 2026</div></div></div>
          <div style={{display:"flex",background:"rgba(255,255,255,0.08)",borderRadius:8,padding:3}}>{[["tree","⬡ Tree"],["list","☰ List"]].map(([v,lbl])=>(<button key={v} onClick={()=>setView(v)} style={{padding:"4px 13px",borderRadius:6,border:"none",background:view===v?BRAND.blue:"transparent",color:view===v?BRAND.white:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all 0.15s"}}>{lbl}</button>))}</div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{usedDepts.map(d=>{const active=activeDept===d;const c=d==="All"?BRAND.blue:d==="WGU"?BRAND.sky:d==="Contractors"?"#6B7A90":d==="Open Roles"?BRAND.lime:dc(d);return(<span key={d} style={{display:"flex",alignItems:"center",gap:5}}>{d==="WGU"&&<span style={{width:1,height:18,background:"rgba(255,255,255,0.2)",display:"inline-block",marginRight:2}}/>}<button onClick={()=>setActiveDept(d)} style={{padding:"4px 12px",borderRadius:20,border:active?`1.5px solid ${c}`:"1.5px solid transparent",background:active?c:"rgba(255,255,255,0.08)",color:active?BRAND.white:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.15s"}}>{d}</button></span>);})}</div>
      </div>
      <div style={{background:"#F0F4F8",borderBottom:`1px solid ${BRAND.gray}`,padding:"8px 20px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{position:"relative",flex:1,maxWidth:360}}><span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:BRAND.textMuted,fontSize:14}}>🔍</span><input value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} placeholder="Search name, title, or department…" style={{width:"100%",padding:"7px 30px 7px 34px",border:`1px solid ${BRAND.gray}`,borderRadius:8,fontSize:12,outline:"none",color:BRAND.navy,background:BRAND.white,boxSizing:"border-box"}}/>{searchTerm&&<button onClick={()=>setSearchTerm("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:BRAND.textMuted,fontSize:13}}>✕</button>}</div>
        <span style={{fontSize:11,color:BRAND.textMuted,flexShrink:0}}>{totalMatches} {totalMatches===1?"person":"people"} found</span>
        {view==="tree"&&!filterActive&&<><button onClick={()=>setExpanded(new Set(employees.map(e=>e.id)))} style={{fontSize:11,color:BRAND.blue,background:"none",border:`1px solid ${BRAND.blue}`,borderRadius:6,padding:"5px 11px",cursor:"pointer",fontWeight:600,flexShrink:0}}>Expand All</button><button onClick={()=>setExpanded(new Set())} style={{fontSize:11,color:BRAND.textMuted,background:"none",border:`1px solid ${BRAND.gray}`,borderRadius:6,padding:"5px 11px",cursor:"pointer",fontWeight:600,flexShrink:0}}>Collapse</button></>}
      </div>
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        {view==="tree"?(
          <div ref={canvasRef} onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp} style={{width:"100%",height:"100%",cursor:dragging?"grabbing":"grab",overflowY:"auto",overflowX:"hidden"}}>
            <div style={{transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,transformOrigin:"top left",transition:dragging?"none":"transform 0.08s ease",padding:"36px 40px 80px",minWidth:"max-content"}}>
              {filterActive?<FilteredNode emp={craftRoot} depth={0} onSelect={onCard} matchFn={matchFn}/>:<TreeNode emp={craftRoot} depth={0} expanded={expanded} onToggle={onToggle} onSelect={onCard}/>}
              {showWGURow&&<WGURow onSelect={onCard}/>}
            </div>
          </div>
        ):(
          <div style={{height:"100%",overflowY:"auto"}}><ListView onSelect={onCard} activeDept={activeDept} searchTerm={searchTerm}/></div>
        )}
        {view==="tree"&&<div style={{position:"absolute",bottom:20,right:selected?312:20,display:"flex",flexDirection:"column",gap:4,transition:"right 0.2s"}}>{[["+",()=>setZoom(z=>Math.min(2,z+0.1))],["−",()=>setZoom(z=>Math.max(0.25,z-0.1))],["⊙",()=>{setZoom(1);setPan({x:0,y:0});}]].map(([icon,fn])=>(<button key={icon} onClick={fn} style={{width:34,height:34,borderRadius:8,border:`1px solid ${BRAND.gray}`,background:BRAND.white,fontSize:15,cursor:"pointer",color:BRAND.navy,boxShadow:"0 2px 8px rgba(0,40,85,0.09)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{icon}</button>))}<div style={{background:BRAND.white,border:`1px solid ${BRAND.gray}`,borderRadius:8,padding:"3px 6px",fontSize:10.5,color:BRAND.textMuted,textAlign:"center"}}>{Math.round(zoom*100)}%</div></div>}
        {view==="tree"&&<div style={{position:"absolute",bottom:20,left:20,pointerEvents:"none",background:"rgba(255,255,255,0.92)",borderRadius:8,padding:"5px 12px",fontSize:10.5,color:BRAND.textMuted,border:`1px solid ${BRAND.gray}`}}>Click <strong style={{color:BRAND.blue}}>badge</strong> to expand · Click card for details · Drag to pan · Ctrl+scroll to zoom</div>}
      </div>
      {selected&&<DetailPanel emp={selected} onClose={()=>setSelected(null)} onSelect={onCard}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
